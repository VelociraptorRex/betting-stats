  <title>Динамика банка</title>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: "Times New Roman", Times, serif;
    }

    main {
      width: min(1500px, calc(100% - 40px));
      margin: 0 auto;
      padding: 34px 0 50px;
    }

    h1 {
      margin: 0 0 24px;
      text-align: center;
      font-size: 44px;
      font-weight: 700;
      line-height: 1.1;
    }

    .top-menu {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 32px;
    }

    .top-menu a {
      min-width: 145px;
      padding: 14px 20px;
      border: 2px solid #fff;
      border-radius: 14px;
      color: #fff;
      text-align: center;
      text-decoration: none;
      font-size: 22px;
      line-height: 1;
      transition: 0.15s ease;
    }

    .top-menu a:hover {
      background: #fff;
      color: #000;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 18px;
      margin-bottom: 32px;
    }

    .summary-card {
      border: 2px solid #fff;
      border-radius: 20px;
      padding: 24px 16px;
      text-align: center;
      background: #080808;
    }

    .summary-card .label {
      display: block;
      margin-bottom: 12px;
      font-size: 24px;
    }

    .summary-card .value {
      display: block;
      margin-bottom: 8px;
      font-size: 44px;
      font-weight: 700;
    }

    .summary-card .sub {
      display: block;
      font-size: 20px;
      color: #cfcfcf;
    }

    .plus {
      color: #3ddc84;
    }

    .minus {
      color: #ff5a5f;
    }

    .chart-block {
      padding: 18px;
      border: 2px solid #fff;
      border-radius: 22px;
      background: #111;
    }

    #bank-chart {
      width: 100%;
      height: 690px;
      background: #fff;
      border-radius: 14px;
      overflow: hidden;
    }

    .note {
      margin: 12px 0 0;
      text-align: center;
      color: #cfcfcf;
      font-size: 18px;
    }

    @media (max-width: 950px) {
      h1 {
        font-size: 34px;
      }

      .summary-grid {
        grid-template-columns: 1fr 1fr;
      }

      .top-menu a {
        min-width: 130px;
        font-size: 19px;
      }

      #bank-chart {
        height: 560px;
      }
    }

    @media (max-width: 560px) {
      main {
        width: min(100% - 20px, 1500px);
      }

      .summary-grid {
        grid-template-columns: 1fr;
      }

      .top-menu {
        gap: 10px;
      }

      .top-menu a {
        min-width: 100%;
      }
    }
  </style>
</head>
